<script>
(function () {
  function safePostMessage(text) {
    try {
      window.ReactNativeWebView.postMessage(String(text));
    } catch (e) {}
  }

  function getTextFromResponse(data) {
    try {
      // ✅ CASE 1: Format normal (parts)
      if (
        data.candidates &&
        data.candidates.length > 0 &&
        data.candidates[0].content &&
        data.candidates[0].content.parts
      ) {
        let parts = data.candidates[0].content.parts;

        let text = parts.map(p => p.text || "").join("");
        if (text.trim() !== "") return text;
      }

      // ✅ CASE 2: Langsung ada text
      if (data.text) {
        return data.text;
      }

      // ✅ CASE 3: Kandidat ada tapi kosong (biasanya ke-filter)
      if (data.candidates && data.candidates.length > 0) {
        return "Jawaban dibatasi atau tidak tersedia";
      }

      return "Tidak ada jawaban dari AI";

    } catch (e) {
      return "Error membaca response";
    }
  }

  function handleMessage(event) {
    try {
      let raw = event.data;
      let data = typeof raw === "string" ? JSON.parse(raw) : raw;

      let text = getTextFromResponse(data);
      safePostMessage(text);

    } catch (e) {
      safePostMessage("Response bukan JSON valid");
    }
  }

  document.addEventListener("message", handleMessage);
  window.addEventListener("message", handleMessage);
})();
</script>
